# GitButler governance — gates (generated by but-init).
# Commit gate: no direct commits to a protected branch (land via merge).
# Merge gate: a distinct reviewer approval from code-reviewers is required at head.

[[branch]]
name = "master"
protected = true

[[gate]]
branch = "master"
type = "review"
min_approvals = 1
require_distinct_from_author = true
require_approval_from_group = ["code-reviewers", "maintainers"]
