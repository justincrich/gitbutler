# GitButler governance — permissions (generated by but-init from the RULES.md roster).
# Ref-pinned: read at the target ref. Commit with `but commit` for it to take effect.

[[group]]
name = "code-reviewers"
permissions = ["reviews:write", "comments:write", "contents:read"]

[[group]]
name = "maintainers"
permissions = ["merge", "reviews:write", "administration:write"]

[[principal]]
id = "rust-planner"
role = "write"

[[principal]]
id = "rust-implementer"
role = "write"

[[principal]]
id = "rust-reviewer"
groups = ["code-reviewers"]

[[principal]]
id = "tauri-planner"
role = "write"

[[principal]]
id = "tauri-implementer"
role = "write"

[[principal]]
id = "tauri-reviewer"
groups = ["code-reviewers"]

[[principal]]
id = "sveltekit-planner"
role = "write"

[[principal]]
id = "sveltekit-implementer"
role = "write"

[[principal]]
id = "sveltekit-reviewer"
groups = ["code-reviewers"]

[[principal]]
id = "electron-planner"
role = "write"

[[principal]]
id = "electron-implementer"
role = "write"

[[principal]]
id = "electron-reviewer"
groups = ["code-reviewers"]

[[principal]]
id = "frontend-designer"
role = "write"

[[principal]]
id = "ghactions-planner"
role = "write"

[[principal]]
id = "ghactions-implementer"
role = "write"

[[principal]]
id = "ghactions-reviewer"
groups = ["code-reviewers"]

[[principal]]
id = "code-reviewer"
groups = ["code-reviewers"]

[[principal]]
id = "security-reviewer"
groups = ["code-reviewers"]

[[principal]]
id = "operator"
role = "maintain"
